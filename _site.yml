name: "Jian Zou"
output_dir: "."

# Navigation is rendered by navbar.html (injected via before_body) so that the
# design-system masthead wraps every page. `navbar:` is omitted here so rmarkdown
# does not also emit a Bootstrap navbar.

output:
  html_document:
    theme: default
    highlight: null
    self_contained: false
    mathjax: null
    includes:
      in_header: header.html
      before_body: navbar.html
      after_body: footer.html
    css:
      - tokens.css
      - site.css
